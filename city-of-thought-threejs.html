<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City of Thought — Three.js v1.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'SF Mono', 'Courier New', monospace; color: #a0a8b8; }
  #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #ui { position: fixed; top: 18px; left: 18px; z-index: 10; pointer-events: none; max-width: 300px; }
  #ui .title { font-size: 20px; font-weight: 700; color: #e8d5b7; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
  #ui .subtitle { font-size: 11px; color: #556070; margin-bottom: 12px; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
  #ui .panel { background: rgba(4,6,12,0.85); border: 1px solid rgba(232,213,183,0.12); border-radius: 6px; padding: 12px 16px; backdrop-filter: blur(6px); }
  #ui .panel .item { font-size: 10px; color: #778090; line-height: 1.7; }
  #ui .panel .item strong { color: #e8d5b7; font-weight: 600; }
  #ui .panel .sep { border-top: 1px solid rgba(255,255,255,0.06); margin: 8px 0; }
  #info { position: fixed; bottom: 18px; right: 18px; z-index: 10; text-align: right; pointer-events: none; text-shadow: 0 1px 8px rgba(0,0,0,0.9); }
  #info .name { font-size: 14px; color: #e8d5b7; font-weight: 700; }
  #info .meta { font-size: 10px; color: #556070; }
  .label-tag { position: absolute; background: rgba(4,6,12,0.9); border: 1px solid rgba(232,213,183,0.15); border-radius: 4px; padding: 6px 10px; font-size: 11px; color: #e8d5b7; white-space: nowrap; pointer-events: none; transform: translate(-50%, -130%); transition: opacity 0.3s; opacity: 0; }
  .label-tag.visible { opacity: 1; }
  .label-tag .sub { color: #667080; font-size: 9px; display: block; margin-top: 2px; }
  #labels { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="canvas-container"></div>
<div id="labels"></div>
<div id="ui">
  <div class="title">City of Thought</div>
  <div class="subtitle">Three.js Knowledge Territory v1.0</div>
  <div class="panel">
    <div class="item"><strong>Drag</strong> — orbit camera</div>
    <div class="item"><strong>Scroll</strong> — zoom in/out</div>
    <div class="item"><strong>Right-drag</strong> — pan</div>
    <div class="item"><strong>Double-click</strong> — reset view</div>
    <div class="sep"></div>
    <div class="item"><strong>Book:</strong> Основы педагогики, 1923</div>
    <div class="item"><strong>Chapters:</strong> 14 · <strong>Parts:</strong> 3 · <strong>Pages:</strong> 449</div>
  </div>
</div>
<div id="info">
  <div class="name" id="city-name">City of Gessen</div>
  <div class="meta">Sergei Gessen · 1923 · Classical · Stone · Dusk</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ════════════════════════════════════════════════════════════════════════
// DATA — Gessen "Основы педагогики" 1923
// ════════════════════════════════════════════════════════════════════════
const CHAPTERS = [
  { n: 1,  title: "Идеал свободного образования",      pages: 24, part: "I",  concept: ["Свобода","Руссо","Толстой"],             grid: [0,0] },
  { n: 2,  title: "Дисциплина, свобода, личность",    pages: 24, part: "I",  concept: ["Дисциплина","Личность","Долг"],           grid: [1,0] },
  { n: 3,  title: "Ступень аномии",                   pages: 34, part: "I",  concept: ["Игра","Фребель","Монтессори"],            grid: [2,0] },
  { n: 4,  title: "Ступень гетерономии",              pages: 33, part: "I",  concept: ["Школа","Труд","Дьюи"],                    grid: [0,1] },
  { n: 5,  title: "Авторитет и свобода",              pages: 22, part: "I",  concept: ["Авторитет","Наказание","Община"],          grid: [1,1] },
  { n: 6,  title: "Система единой школы",             pages: 23, part: "I",  concept: ["Единая школа","Либерализм","Равенство"],  grid: [2,1] },
  { n: 7,  title: "Автономия (внешкольное)",          pages: 34, part: "I",  concept: ["Самообразование","Библиотека","Университет"], grid: [0,2] },
  { n: 8,  title: "Цель научного образования",        pages: 19, part: "II", concept: ["Научность","Мышление","Критицизм"],        grid: [3,0] },
  { n: 9,  title: "Состав научного образования",      pages: 23, part: "II", concept: ["Классификация","Науки","Естествознание"],  grid: [4,0] },
  { n: 10, title: "Эпизодический курс",               pages: 19, part: "II", concept: ["Эпизод","Наглядность","Познание"],          grid: [3,1] },
  { n: 11, title: "Систематический курс",             pages: 15, part: "II", concept: ["Система","Преподавание","Догматизм"],       grid: [4,1] },
  { n: 12, title: "Теория университета",              pages: 22, part: "II", concept: ["Университет","Исследование","Свобода"],     grid: [3,2] },
  { n: 13, title: "Национальное образование",         pages: 26, part: "III",concept: ["Нация","Ушинский","Фихте"],                 grid: [5,0] },
  { n: 14, title: "Физическое образование",           pages: 90, part: "III",concept: ["Тело","Гигиена","Здоровье"],              grid: [5,1] },
];

const PARTS = {
  "I":  { name: "Нравственное образование",  color: new THREE.Color('#2a3a5a'), accent: new THREE.Color('#4a6a9a'), emissive: new THREE.Color('#1a2848') },
  "II": { name: "Научное образование",       color: new THREE.Color('#3a2a5a'), accent: new THREE.Color('#6a4a9a'), emissive: new THREE.Color('#281a48') },
  "III":{ name: "Национальное и физическое", color: new THREE.Color('#2a4a3a'), accent: new THREE.Color('#4a8a6a'), emissive: new THREE.Color('#1a3828') },
};

const MIN_P = Math.min(...CHAPTERS.map(c=>c.pages));
const MAX_P = Math.max(...CHAPTERS.map(c=>c.pages));

// ════════════════════════════════════════════════════════════════════════
// SCENE
// ════════════════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

// Deep dusk fog
scene.fog = new THREE.FogExp2(0x060a14, 0.0015);
scene.background = new THREE.Color(0x060a14);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(180, 140, 180);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;
container.appendChild(renderer.domElement);

// ─── Post-processing: Bloom ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.5, 0.85);
composer.addPass(bloomPass);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 40;
controls.maxDistance = 500;
controls.maxPolarAngle = Math.PI * 0.48;
controls.target.set(0, 15, 0);

// ════════════════════════════════════════════════════════════════════════
// LIGHTING
// ════════════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x1a2848, 0.8));

const sun = new THREE.DirectionalLight(0xffd5a0, 1.2);
sun.position.set(100, 200, 80);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 500;
sun.shadow.camera.left = -300;
sun.shadow.camera.right = 300;
sun.shadow.camera.top = 300;
sun.shadow.camera.bottom = -300;
sun.shadow.bias = -0.0005;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x4060a0, 0.3);
fill.position.set(-80, 60, -60);
scene.add(fill);

// ════════════════════════════════════════════════════════════════════════
// GROUND
// ════════════════════════════════════════════════════════════════════════
const groundGeo = new THREE.PlaneGeometry(800, 800, 128, 128);
// Displace vertices for terrain
const pos = groundGeo.attributes.position;
for(let i=0;i<pos.count;i++){
  let x = pos.getX(i), y = pos.getY(i);
  let h = Math.sin(x*0.02)*4 + Math.cos(y*0.015)*3 + (Math.random()-0.5)*1.5;
  // Flatten under city area
  if(Math.abs(x)<120 && Math.abs(y)<100) h *= 0.3;
  pos.setZ(i, h);
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0c1220, roughness: 0.9, metalness: 0.05,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid roads
const gridHelper = new THREE.GridHelper(800, 40, 0x1a2840, 0x0e1525);
gridHelper.position.y = 0.2;
scene.add(gridHelper);

// ════════════════════════════════════════════════════════════════════════
// BUILDINGS
// ════════════════════════════════════════════════════════════════════════
const buildings = [];
const labelContainer = document.getElementById('labels');

function makeTextTexture(text, sub, color='#e8d5b7') {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.clearRect(0,0,512,256);
  ctx.font = 'bold 32px "SF Mono", monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 60);
  ctx.font = '22px "SF Mono", monospace';
  ctx.fillStyle = '#8890a0';
  ctx.fillText(sub, 256, 95);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

CHAPTERS.forEach((ch, idx) => {
  const part = PARTS[ch.part];
  const h = THREE.MathUtils.mapLinear(ch.pages, MIN_P, MAX_P, 20, 160);
  const w = 22 + Math.random()*8;
  const d = 18 + Math.random()*6;

  // Position from grid
  const gx = ch.grid[0] * 45 - 120 + (Math.random()-0.5)*12;
  const gz = ch.grid[1] * 40 - 50 + (Math.random()-0.5)*12;

  // Building geometry
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({
    color: part.color,
    roughness: 0.75,
    metalness: 0.1,
    emissive: part.emissive,
    emissiveIntensity: 0.15,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(gx, h/2 + 1, gz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { chapter: ch, part: part, index: idx };
  scene.add(mesh);

  // Roof detail (step)
  const roofGeo = new THREE.BoxGeometry(w+2, 3, d+2);
  const roofMat = new THREE.MeshStandardMaterial({ color: part.accent, roughness: 0.6, metalness: 0.2 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(gx, h + 2.5, gz);
  roof.castShadow = true;
  scene.add(roof);

  // Windows (emissive strips)
  const winRows = Math.floor(h / 14);
  const winLit = Math.floor(THREE.MathUtils.mapLinear(ch.pages, MIN_P, MAX_P, 2, 6));
  for(let wr=0; wr<winRows; wr++){
    if(wr >= winLit) continue;
    const wy = h/2 - 8 - wr*14;
    // Front windows
    const wGeo = new THREE.PlaneGeometry(w*0.6, 2);
    const wMat = new THREE.MeshBasicMaterial({ color: 0xffd57a, side: THREE.DoubleSide });
    const win = new THREE.Mesh(wGeo, wMat);
    win.position.set(gx, wy, gz + d/2 + 0.2);
    scene.add(win);
    // Side windows
    const sGeo = new THREE.PlaneGeometry(2, 2);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xffd57a, side: THREE.DoubleSide });
    const swin = new THREE.Mesh(sGeo, sMat);
    swin.position.set(gx + w/2 + 0.2, wy, gz);
    swin.rotation.y = Math.PI/2;
    scene.add(swin);
  }

  // Label (DOM overlay)
  const label = document.createElement('div');
  label.className = 'label-tag';
  label.innerHTML = `<div>${ch.title}</div><span class="sub">${ch.pages} pp · ${ch.concept[0]}</span>`;
  labelContainer.appendChild(label);

  buildings.push({ mesh, roof, label, h, w, d, ch, gx, gz });
});

// ════════════════════════════════════════════════════════════════════════
// PARTICLES (dust + embers via InstancedMesh)
// ════════════════════════════════════════════════════════════════════════
const pCount = 800;
const pGeo = new THREE.SphereGeometry(0.4, 6, 6);
const pMat = new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.6 });
const pMesh = new THREE.InstancedMesh(pGeo, pMat, pCount);
const pDummy = new THREE.Object3D();
const pData = [];
for(let i=0;i<pCount;i++){
  const x = (Math.random()-0.5)*400;
  const y = Math.random()*180 + 10;
  const z = (Math.random()-0.5)*400;
  const s = Math.random()*0.5+0.3;
  pDummy.position.set(x,y,z);
  pDummy.scale.set(s,s,s);
  pDummy.updateMatrix();
  pMesh.setMatrixAt(i, pDummy.matrix);
  pData.push({x,y,z,vx:(Math.random()-0.5)*0.02,vy:-Math.random()*0.03-0.01,vz:(Math.random()-0.5)*0.02,life:Math.random()*200});
}
scene.add(pMesh);

// ════════════════════════════════════════════════════════════════════════
// FOG SPHERES (ground mist)
// ════════════════════════════════════════════════════════════════════════
const fogCount = 40;
const fGeo = new THREE.SphereGeometry(1, 8, 8);
const fMat = new THREE.MeshBasicMaterial({ color: 0x1a3050, transparent: true, opacity: 0.12 });
const fMesh = new THREE.InstancedMesh(fGeo, fMat, fogCount);
const fData = [];
for(let i=0;i<fogCount;i++){
  const x = (Math.random()-0.5)*300;
  const z = (Math.random()-0.5)*250;
  const y = Math.random()*3 + 0.5;
  const s = Math.random()*12+6;
  pDummy.position.set(x,y,z);
  pDummy.scale.set(s,s,s);
  pDummy.updateMatrix();
  fMesh.setMatrixAt(i, pDummy.matrix);
  fData.push({x,y,z,s,phase:Math.random()*Math.PI*2});
}
scene.add(fMesh);

// ════════════════════════════════════════════════════════════════════════
// DISTRICT LABELS (3D sprites)
// ════════════════════════════════════════════════════════════════════════
[['PART I', 'Нравственное образование', -100, 60, -30],
 ['PART II', 'Научное образование', 30, 60, -30],
 ['PART III', 'Национальное и физическое', 180, 60, -30]].forEach(([title,sub,x,y,z])=>{
  const tex = makeTextTexture(title, sub);
  const sprMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 });
  const spr = new THREE.Sprite(sprMat);
  spr.position.set(x, y, z);
  spr.scale.set(60, 30, 1);
  scene.add(spr);
});

// ════════════════════════════════════════════════════════════════════════
// RAYCASTER + INTERACTION
// ════════════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null, selected = null;
let selBox = null;

function onMouseMove(e){
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}
function onClick(e){
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(buildings.map(b=>b.mesh));
  if(hits.length > 0){
    const b = hits[0].object.userData;
    selected = b;
    document.getElementById('city-name').textContent = b.chapter.title;
    document.getElementById('city-meta').textContent = `${b.chapter.pages} pages · ${b.chapter.concept.join(', ')} · ${b.part.name}`;
    // Selection box
    if(selBox) scene.remove(selBox);
    const bb = new THREE.Box3().setFromObject(hits[0].object);
    const sz = new THREE.Vector3();
    bb.getSize(sz);
    const boxGeo = new THREE.BoxGeometry(sz.x+2, sz.y+2, sz.z+2);
    const boxMat = new THREE.MeshBasicMaterial({ color: 0xffd57a, wireframe: true, transparent: true, opacity: 0.6 });
    selBox = new THREE.Mesh(boxGeo, boxMat);
    selBox.position.copy(hits[0].object.position);
    scene.add(selBox);
  } else {
    selected = null;
    if(selBox){ scene.remove(selBox); selBox = null; }
    document.getElementById('city-name').textContent = 'City of Gessen';
    document.getElementById('city-meta').textContent = 'Sergei Gessen · 1923 · Classical · Stone · Dusk';
  }
}
function onDblClick(){
  camera.position.set(180, 140, 180);
  controls.target.set(0, 15, 0);
  selected = null;
  if(selBox){ scene.remove(selBox); selBox = null; }
  document.getElementById('city-name').textContent = 'City of Gessen';
  document.getElementById('city-meta').textContent = 'Sergei Gessen · 1923 · Classical · Stone · Dusk';
}
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('dblclick', onDblClick);

// ════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  controls.update();

  // Animate particles
  for(let i=0;i<pCount;i++){
    let pd = pData[i];
    pd.x += pd.vx; pd.y += pd.vy; pd.z += pd.vz;
    pd.life -= dt*10;
    if(pd.life <= 0 || pd.y < 0){ pd.x=(Math.random()-0.5)*400; pd.y=Math.random()*180+10; pd.z=(Math.random()-0.5)*400; pd.life=Math.random()*200+50; }
    pDummy.position.set(pd.x, pd.y, pd.z);
    let s = 0.3 + Math.sin(t*2 + i)*0.15;
    pDummy.scale.set(s,s,s);
    pDummy.updateMatrix();
    pMesh.setMatrixAt(i, pDummy.matrix);
  }
  pMesh.instanceMatrix.needsUpdate = true;

  // Animate fog
  for(let i=0;i<fogCount;i++){
    let fd = fData[i];
    let drift = Math.sin(t*0.3 + fd.phase)*8;
    pDummy.position.set(fd.x + drift, fd.y + Math.sin(t*0.5+i)*0.5, fd.z);
    pDummy.scale.set(fd.s, fd.s*0.4, fd.s);
    pDummy.updateMatrix();
    fMesh.setMatrixAt(i, pDummy.matrix);
  }
  fMesh.instanceMatrix.needsUpdate = true;

  // Update DOM labels
  buildings.forEach(b=>{
    const pos = b.mesh.position.clone();
    pos.y += b.h/2 + 10;
    pos.project(camera);
    const sx = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    b.label.style.left = sx + 'px';
    b.label.style.top = sy + 'px';
    const dist = camera.position.distanceTo(b.mesh.position);
    if(pos.z < 1 && dist < 300 && dist > 80){
      b.label.classList.add('visible');
    } else {
      b.label.classList.remove('visible');
    }
  });

  // Pulse selected box
  if(selBox){
    selBox.material.opacity = 0.4 + Math.sin(t*3)*0.2;
    selBox.rotation.y += dt*0.5;
  }

  // Pulse windows
  buildings.forEach((b,idx)=>{
    const flick = Math.sin(t*2 + idx)*0.15 + 0.85;
    b.mesh.material.emissiveIntensity = 0.1 + flick*0.08;
  });

  composer.render();
}
animate();

// Resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Save screenshot
window.addEventListener('keydown', e=>{
  if(e.key==='s' || e.key==='S'){
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = 'city-of-thought-threejs.png';
    link.href = renderer.domElement.toDataURL('image/png');
    link.click();
  }
});
</script>
</body>
</html>
